name = "chef-nam"
# Astro 6 / @astrojs/cloudflare v13 runs workerd during build; the old
# 2024-01-01 date tripped a Vite-runner RPC error. 2024-09-23 + nodejs_compat
# matches the working Astro-6 siblings (sugarhouse, trombone) and is required
# for output:'server' (Sanity client and other Node APIs).
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Service binding to the lead-notification email worker. A Worker can't fetch
# another Worker on the same account via its public URL (CF error 1042) — that
# worked under Pages but breaks on Workers. Bind it and call EMAIL_WORKER.fetch().
[[services]]
binding = "EMAIL_WORKER"
service = "chefnam-email-worker"
