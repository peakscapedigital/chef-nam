name = "chef-nam"
# Astro 6 / @astrojs/cloudflare v13 runs workerd during build; the old
# 2024-01-01 date tripped a Vite-runner RPC error. 2024-09-23 + nodejs_compat
# matches the working Astro-6 siblings (sugarhouse, trombone) and is required
# for output:'server' (Sanity client and other Node APIs).
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Workers Logs — retains console.* (incl. site-kit recordConversion + notifyOps
# output) so the backgrounded lead pipeline's failures are debuggable. Standard
# for all client workers (see systems-v2/site-deploy-standard.md).
[observability]
enabled = true

# Lead + confirmation emails are sent directly from the site Worker via the
# Resend REST API (src/lib/email.ts), so no email-worker service binding is
# needed. RESEND_API_KEY is a runtime secret (Approach C). (SYS-008)
