name: Deploy to Cloudflare Workers (production)

on:
  push:
    branches: [main]
    # Doc-only commits never reach the Worker build — skip prod deploys for them.
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.claude/**'

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (astro check)
        # Blocking quality gate — the build is transpile-only and won't catch
        # type errors. Keeps astro check at zero (site-deploy-standard rule 2).
        run: npx astro check

      - name: Write .env
        # Single ENV_FILE secret = source of truth for both build-time PUBLIC
        # vars (read via import.meta.env) and the runtime secrets pushed below.
        # Pass via env + printf (NOT inline ${{ }}) so values containing quotes
        # — e.g. the service-account JSON — aren't mangled by shell interpolation.
        run: printf '%s\n' "$ENV_FILE" > .env
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        # @astrojs/cloudflare v13 writes .wrangler/deploy/config.json at repo
        # root pointing wrangler at dist/. Worker name comes from wrangler.toml
        # (chef-nam). SESSION KV is auto-provisioned as chef-nam-session.
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Push runtime secrets to the Worker (Approach C)
        # Server code reads secrets at runtime via `cloudflare:workers` — NOT
        # baked into the bundle. JSON format (not .env) so service-account JSON
        # values survive intact. Idempotent; persists across deploys.
        run: |
          node scripts/secrets-to-json.mjs
          npx wrangler secret bulk secrets.json --name chef-nam
          rm -f secrets.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
