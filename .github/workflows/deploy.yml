name: Deploy to Cloudflare Workers (production)

on:
  push:
    branches: [main]
    # Doc-only commits never reach the Worker build — skip prod deploys for them.
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.claude/**'
      # The Sanity Studio is a separate app nested in this repo; it deploys
      # via `sanity deploy`, not the site Worker. Studio-only changes must
      # not trigger a live-site redeploy.
      - 'chef-nam-catering/**'

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Don't persist the default GITHUB_TOKEN http extraheader — it overrides
          # the kit-token URL credentials and makes the private @peakscape/site-kit
          # install fail "Repository not found" (actions/checkout #162).
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Configure git auth for the private @peakscape/site-kit dependency
        env:
          SITE_KIT_TOKEN: ${{ secrets.SITE_KIT_TOKEN }}
        run: |
          # npm normalizes the git+https dep to git+ssh in the lockfile, so npm ci
          # clones over ssh. Rewrite ONLY the kit repo's ssh URL to https+token.
          git config --global \
            url."https://x-access-token:${SITE_KIT_TOKEN}@github.com/peakscapedigital/peakscape-site-kit".insteadOf \
            "ssh://git@github.com/peakscapedigital/peakscape-site-kit"

      - name: Install dependencies
        run: npm ci

      - name: Type check (astro check)
        # Blocking quality gate — the build is transpile-only and won't catch
        # type errors. Keeps astro check at zero (site-deploy-standard rule 2).
        run: npx astro check

      - name: Write .env
        # Single ENV_FILE secret = source of truth for both build-time PUBLIC
        # vars (read via import.meta.env) and the runtime secrets pushed below.
        # Pass via env + printf (NOT inline ${{ }}) so values containing quotes
        # — e.g. the service-account JSON — aren't mangled by shell interpolation.
        run: |
          printf '%s\n' "$ENV_FILE" > .env
          printf 'RESEND_API_KEY=%s\n' "$RESEND_API_KEY" >> .env
          printf 'SHEETS_CREDENTIALS=%s\n' "$SHEETS_CREDENTIALS" >> .env
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          # Discrete rotatable secret (site-deploy-standard rule 3) for the
          # lead/confirmation emails sent directly via Resend (SYS-008).
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Service-account key (base64) for the Google Sheet lead hub.
          SHEETS_CREDENTIALS: ${{ secrets.SHEETS_CREDENTIALS }}

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        # @astrojs/cloudflare v13 writes .wrangler/deploy/config.json at repo
        # root pointing wrangler at dist/. Worker name comes from wrangler.toml
        # (chef-nam). SESSION KV is auto-provisioned as chef-nam-session.
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Push runtime secrets to the Worker (Approach C)
        # Server code reads secrets at runtime via `cloudflare:workers` — NOT
        # baked into the bundle. JSON format (not .env) so service-account JSON
        # values survive intact. Idempotent; persists across deploys.
        run: |
          node scripts/secrets-to-json.mjs
          npx wrangler secret bulk secrets.json --name chef-nam
          rm -f secrets.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
