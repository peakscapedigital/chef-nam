name: Preview Deploy (Workers)

on:
  push:
    branches-ignore: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.claude/**'
      # Sanity Studio (nested app) deploys via `sanity deploy`, not the
      # site Worker — keep Studio-only changes from triggering previews.
      - 'chef-nam-catering/**'

concurrency:
  group: preview-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (astro check)
        run: npx astro check

      - name: Write .env
        # Pass via env + printf (NOT inline ${{ }}) so quote-containing values
        # (service-account JSON) aren't mangled by shell interpolation.
        run: |
          printf '%s\n' "$ENV_FILE" > .env
          echo "WORKER_ENV=preview" >> .env
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}

      - name: Build
        run: npm run build

      - name: Deploy preview to Cloudflare Workers
        # --name override gives a separate preview Worker (chef-nam-preview) with
        # its own auto-provisioned chef-nam-preview-session KV. Apex domain stays
        # on the production Worker; preview is reachable only at its workers.dev URL.
        run: npx wrangler deploy --name chef-nam-preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Push runtime secrets to the preview Worker
        # JSON format (not .env) so service-account JSON values survive intact.
        run: |
          node scripts/secrets-to-json.mjs
          npx wrangler secret bulk secrets.json --name chef-nam-preview
          rm -f secrets.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
